name: Pre-Market Options Report

on:
  schedule:
    # 9:21 AM IST = 3:51 AM UTC. GitHub schedules may be delayed by queueing.
    - cron: "51 3 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        run: python src/premarket_report.py

      - name: Commit report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Add pre-market report"
          file_pattern: reports/*.md
